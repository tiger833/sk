<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Koushik ❤️ Sneha</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* Slideshow container with extra size for pan */
.slideshow {
    position: fixed;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    z-index: 0;
}

/* Slides with slow zoom + pan */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: cinematic 32s infinite;
}

/* Delay each image */
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 8s; }
.slide:nth-child(3) { animation-delay: 16s; }
.slide:nth-child(4) { animation-delay: 24s; }

/* Slow zoom + left-right pan */
@keyframes cinematic {
    0%   { opacity: 0; transform: scale(1) translateX(-5%); }
    10%  { opacity: 1; transform: scale(1.05) translateX(-2%); }
    40%  { opacity: 1; transform: scale(1.15) translateX(2%); }
    60%  { opacity: 1; transform: scale(1.2) translateX(5%); }
    80%  { opacity: 0; transform: scale(1.25) translateX(8%); }
    100% { opacity: 0; }
}

/* Dark cinematic overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.4));
    z-index: 1;
}

/* Romantic intro animation */
.intro {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 45%;
    font-size: 48px;
    letter-spacing: 4px;
    z-index: 2;
    opacity: 0;
    animation: introAnim 6s ease forwards;
}

@keyframes introAnim {
    0% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-40px); }
}

/* Birthday title after intro */
.typing {
    position: relative;
    z-index: 2;
    font-size: 40px;
    margin-top: 60px;
    text-align: center;
    opacity: 0;
    animation: showTitle 4s ease forwards;
    animation-delay: 6s;
}

@keyframes showTitle {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Message */
.message {
    position: absolute;
    bottom: 120px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 5s ease forwards;
    animation-delay: 8s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* Cake */
.cake {
    position: absolute;
    bottom: 50px;
    width: 100%;
    text-align: center;
    font-size: 50px;
    z-index: 2;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    50% { transform: translateY(-15px); }
}

/* Floating Hearts */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: float 6s linear infinite;
    z-index: 2;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Fireworks canvas */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
}
</style>
</head>

</html>
